name: build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/setup@v1
        with:
          runtime: node@26
          version: 11.7.0
          install: true

      - run: pnpm run build

      - run: |
          aws s3 sync outputs/ s3://static/clash/ \
            --endpoint-url https://s3.mioyi.net \
            --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
